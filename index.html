<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Eternal</title>
    
    <!-- PWA Meta -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020203">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@200;300;400;500;600&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-blot-formatter@1.0.5/dist/quill-blot-formatter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --space-black: #020204;
            --archival-gold: rgba(212, 175, 55, 0.4);
            --slate-border: rgba(255, 255, 255, 0.08);
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            background-color: var(--space-black); color: #f1f5f9; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; 
        }
        @media (min-width: 1024px) { body { flex-direction: row; } }
        
        .vignette {
            position: fixed; inset: 0; pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
            z-index: 5;
        }

        .glass-panel {
            background: rgba(10, 10, 12, 0.82);
            backdrop-filter: blur(40px) saturate(160%);
            -webkit-backdrop-filter: blur(40px) saturate(160%);
            border: 0.5px solid var(--slate-border);
            box-shadow: 0 10px 50px -10px rgba(0, 0, 0, 0.95);
        }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        /* Font Engine Mapping */
        .ql-font-inter { font-family: 'Inter', sans-serif; }
        .ql-font-cinzel { font-family: 'Cinzel', serif; }
        .ql-font-garamond { font-family: 'EB Garamond', serif; }
        .ql-font-playfair { font-family: 'Playfair Display', serif; }
        .ql-font-jetbrains { font-family: 'JetBrains Mono', monospace; }

        /* Fix Quill Font Picker Labels */
        .ql-snow .ql-picker.ql-font .ql-picker-label::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item::before { content: 'Standard'; }
        
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="inter"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="inter"]::before { content: 'Standard'; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="cinzel"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="cinzel"]::before { content: 'Eternal'; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="garamond"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="garamond"]::before { content: 'Scholarly'; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="playfair"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="playfair"]::before { content: 'Imperial'; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="jetbrains"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="jetbrains"]::before { content: 'Technical'; }

        /* Toolbar Styling */
        .ql-toolbar.ql-snow { 
            border: none; 
            background: rgba(15, 15, 18, 0.9); 
            border-bottom: 0.5px solid var(--slate-border); 
            padding: 8px; 
            display: flex; 
            flex-wrap: wrap;
            gap: 4px; 
        }
        .ql-container.ql-snow { border: none !important; color: #f8fafc; font-size: 1rem; }
        .ql-editor { padding: 1.5rem; line-height: 1.8; font-weight: 300; letter-spacing: 0.015em; }
        
        @media (min-width: 768px) { 
            .ql-editor { padding: 3rem 4rem; line-height: 2; }
        }
        @media (min-width: 1280px) {
            .ql-editor { padding: 4rem 8rem; }
        }

        .ql-snow .ql-stroke { stroke: #94a3b8; stroke-width: 1.5px; }
        .ql-snow .ql-picker { color: #94a3b8; font-size: 11px; }
        .ql-snow .ql-picker-options { background-color: #0c0c0e !important; border: 0.5px solid var(--slate-border) !important; border-radius: 8px; z-index: 100; }

        .logo-glow { text-shadow: 0 0 30px rgba(255, 255, 255, 0.4); letter-spacing: 0.3em; }
        
        .premium-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            border: 0.5px solid var(--slate-border);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-btn:hover {
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.04) 100%);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        .sidebar-item { border-left: 1px solid transparent; transition: all 0.3s ease; }
        .sidebar-item.active { border-left-color: #64748b; background: rgba(255, 255, 255, 0.03); }

        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); background-size: 200% 100%; animation: shimmer 4s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        #command-menu { opacity: 0; pointer-events: none; transform: translateY(10px); transition: all 0.3s ease; }
        #command-menu.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        
        /* Mobile Specific Overrides */
        @media (max-width: 768px) {
            .ql-toolbar.ql-snow .ql-formats { margin-right: 8px !important; }
            .premium-btn span { font-size: 9px; }
        }
    </style>
</head>
<body class="antialiased relative">

    <div class="vignette"></div>
    <div id="canvas-container" class="fixed inset-0 z-0 pointer-events-none"></div>

    <!-- HOME SCREEN -->
    <div id="homepage-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/20 backdrop-blur-[2px]">
        <div class="absolute top-6 right-6 md:top-10 md:right-10 flex items-center gap-6">
            <button onclick="toggleFullscreen()" class="text-white/30 hover:text-white transition-all p-2">
                <i id="fullscreen-icon-home" class="ph ph-corners-out text-2xl"></i>
            </button>
        </div>

        <div class="flex flex-col items-center text-center px-6 max-w-lg">
            <i class="ph ph-infinity text-5xl md:text-6xl text-white mb-6 md:mb-8 drop-shadow-[0_0_25px_rgba(255,255,255,0.5)]"></i>
            <h1 class="text-4xl sm:text-6xl md:text-7xl font-bold text-white mb-4 md:mb-6 logo-glow uppercase" style="font-family: 'Cinzel', serif;">The Eternal</h1>
            <p class="text-white font-semibold tracking-[0.4em] md:tracking-[0.6em] mb-10 md:mb-12 uppercase text-[9px] md:text-xs opacity-90">Infinite Archival Core</p>
            
            <button onclick="enterWorkspace()" class="premium-btn group py-5 md:py-6 px-10 md:px-16 text-white rounded-full font-bold transition-all backdrop-blur-md uppercase tracking-[0.4em] text-[10px] md:text-[11px] shadow-2xl relative overflow-hidden">
                <span class="relative z-10 flex items-center gap-4">Enter Workspace <i class="ph ph-arrow-right"></i></span>
                <div class="shimmer absolute inset-0"></div>
            </button>
        </div>
    </div>

    <!-- WORKSPACE SCREEN -->
    <div id="workspace-overlay" class="workspace-transition absolute inset-0 z-10 flex w-full h-full p-2 sm:p-5 gap-3 lg:gap-5 bg-transparent opacity-0 pointer-events-none transform scale-100 hidden">
        
        <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-30 opacity-0 pointer-events-none transition-opacity duration-300 lg:hidden"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="glass-panel fixed inset-y-2 left-2 w-[calc(100%-1rem)] max-w-[300px] lg:relative lg:inset-0 lg:w-72 lg:max-w-none z-40 flex flex-col rounded-[1.5rem] md:rounded-[2rem] overflow-hidden transition-transform duration-500 -translate-x-[110%] lg:translate-x-0">
            <div class="p-6 md:p-8 border-b border-white/5 flex flex-col gap-2 relative">
                <!-- Navigation Close Button (Mobile Only) -->
                <button onclick="toggleSidebar()" class="lg:hidden absolute top-6 right-6 text-slate-500 hover:text-white transition-colors p-1" aria-label="Close Navigation">
                    <i class="ph ph-x text-2xl"></i>
                </button>

                <div class="flex items-center gap-3 cursor-pointer group" onclick="exitWorkspace()">
                    <i class="ph ph-infinity text-xl text-slate-400 group-hover:text-white transition-colors"></i>
                    <h1 class="text-lg font-bold tracking-[0.2em] text-white/90" style="font-family: 'Cinzel', serif;">ETERNAL</h1>
                </div>
                <span class="text-[8px] tracking-[0.3em] text-slate-500 uppercase font-bold">Terminal Sector 001</span>
            </div>

            <div id="sidebar-content" class="flex-1 overflow-y-auto px-4 py-6 space-y-1.5 custom-scroll"></div>

            <div class="p-4 md:p-6 border-t border-white/5 bg-black/20">
                <div id="command-menu" class="absolute left-4 right-4 bottom-20 md:bottom-24 glass-panel rounded-2xl overflow-hidden z-50">
                    <button onclick="createNewDocument('root')" class="w-full p-4 flex items-center gap-4 text-left hover:bg-white/[0.03] transition-all">
                        <i class="ph ph-plus-circle text-slate-400 text-lg"></i>
                        <span class="text-[9px] font-bold uppercase tracking-widest text-white/70">New Record</span>
                    </button>
                    <button onclick="openFolderModal()" class="w-full p-4 flex items-center gap-4 text-left hover:bg-white/[0.03] transition-all">
                        <i class="ph ph-folder-plus text-slate-400 text-lg"></i>
                        <span class="text-[9px] font-bold uppercase tracking-widest text-white/70">Establish Sector</span>
                    </button>
                </div>
                <button id="command-toggle" onclick="toggleCommandMenu()" class="premium-btn w-full py-4 px-4 text-white/60 hover:text-white rounded-xl text-[9px] font-bold uppercase tracking-[0.3em] transition-all flex items-center justify-between group">
                    <span>Initialize</span>
                    <i class="ph ph-caret-up group-hover:translate-y-[-2px] transition-transform" id="command-caret"></i>
                </button>
            </div>

            <div class="px-8 py-4 text-[8px] text-slate-600 flex items-center justify-between tracking-[0.2em] uppercase font-bold">
                <span id="db-status" class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-800" id="status-dot"></div> OFFLINE
                </span>
                <i class="ph ph-shield-check text-base hover:text-slate-300 cursor-pointer"></i>
            </div>
        </aside>

        <!-- Main Panel -->
        <main class="flex-1 glass-panel rounded-[1.5rem] md:rounded-[2rem] flex flex-col overflow-hidden h-full relative z-10 shadow-3xl">
            <header class="px-4 py-4 md:px-8 lg:px-12 md:py-6 border-b border-white/5 flex items-center justify-between bg-white/[0.01]">
                <div class="flex items-center gap-3 md:gap-6 flex-1 min-w-0">
                    <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 p-2"><i class="ph ph-list text-2xl"></i></button>
                    <div class="flex flex-col gap-1 w-full max-w-2xl">
                        <input type="text" id="doc-title" placeholder="Entry Designation..." class="bg-transparent text-lg md:text-2xl font-light text-white outline-none w-full focus:text-slate-200 placeholder:opacity-30 truncate" value="Archival Record" style="font-family: 'Cinzel', serif;">
                        <div class="text-[7px] md:text-[8px] uppercase tracking-[0.4em] text-slate-500 font-bold flex items-center gap-2">
                            SYSTEM <i class="ph ph-caret-right text-[6px]"></i> <span id="current-loc-label" class="text-slate-400 truncate">CORE ARCHIVE</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-1 md:gap-2">
                    <button onclick="exitWorkspace()" class="hidden sm:block p-2 text-slate-500 hover:text-white transition-all rounded-xl" title="Exit"><i class="ph ph-house-line text-xl"></i></button>
                    <button onclick="toggleFullscreen()" class="hidden sm:block p-2 text-slate-500 hover:text-white transition-all rounded-xl" title="Immersive"><i id="fullscreen-icon" class="ph ph-corners-out text-xl"></i></button>
                    <button onclick="deleteCurrentDocument()" id="delete-btn" class="hidden p-2 text-red-900/40 hover:text-red-500 transition-all rounded-xl"><i class="ph ph-trash-simple text-xl"></i></button>
                    <button onclick="saveDocument()" class="ml-2 py-3 px-4 md:px-8 premium-btn text-white/80 hover:text-white rounded-xl text-[8px] md:text-[9px] font-bold uppercase tracking-[0.2em] md:tracking-[0.3em] transition-all flex items-center gap-2">
                        <i class="ph ph-fingerprint text-lg"></i> <span class="hidden xs:inline">Preserve</span>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto custom-scroll bg-black/5">
                <div class="max-w-4xl mx-auto min-h-full py-8 md:py-16 px-4 md:px-0">
                    <div id="editor"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Folder Modal -->
    <div id="folder-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-2xl opacity-0 pointer-events-none transition-all duration-500 p-6">
        <div class="glass-panel p-8 md:p-12 rounded-[2rem] md:rounded-[3rem] max-w-md w-full border-white/10 scale-95 transition-all shadow-3xl" id="folder-modal-content">
            <h2 class="text-xl md:text-2xl font-light tracking-[0.2em] mb-4 uppercase text-white/90" style="font-family: 'Cinzel', serif;">New Archival Sector</h2>
            <p class="text-[9px] text-slate-500 mb-8 md:mb-10 tracking-[0.3em] uppercase font-bold">Initialize categorization containment.</p>
            <input type="text" id="folder-name-input" placeholder="Sector Name..." class="w-full bg-white/5 border border-white/10 rounded-xl px-6 py-4 text-white outline-none text-sm mb-10 focus:border-white/30 transition-all">
            <div class="flex flex-col sm:flex-row gap-4">
                <button onclick="closeFolderModal()" class="order-2 sm:order-1 flex-1 py-4 text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] hover:text-white transition-colors">Abort</button>
                <button onclick="submitNewFolder()" class="order-1 sm:order-2 flex-1 py-4 premium-btn text-white rounded-xl font-bold text-[10px] uppercase tracking-[0.3em]">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Environment Config
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'the-eternal-v1';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db, auth, currentUser = null;
        let quill = null, folders = [], documents = [], currentFolderId = null, currentDocumentId = null;

        // Initialization Logic (Auth Before Queries Rule)
        async function initSystems() {
            initStars();
            initEditor();

            if (!firebaseConfig.apiKey) {
                console.warn("Archival engine offline: No configuration detected.");
                loadLocalBackup();
                return;
            }

            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // Strict Auth-First Execution
            try {
                if (initialToken) {
                    await signInWithCustomToken(auth, initialToken);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Archival authentication failed:", err);
            }

            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                const dot = document.getElementById('status-dot');
                const st = document.getElementById('db-status');
                
                if (user) {
                    if (dot) dot.style.backgroundColor = '#94a3b8';
                    if (st) st.innerHTML = 'SYSTEM ONLINE';
                    await syncFromArchive();
                } else {
                    if (dot) dot.style.backgroundColor = '#1e293b';
                    if (st) st.innerHTML = 'SYSTEM OFFLINE';
                }
            });
        }

        // Database Sync Logic
        async function syncFromArchive() {
            if (!currentUser || !db) return;
            try {
                // Fetch Records (Documents)
                const docRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'space_docs');
                const dSnap = await getDocs(docRef);
                documents = [];
                dSnap.forEach(d => documents.push(d.data()));

                // Fetch Sectors (Folders)
                const foldRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'space_folders');
                const fSnap = await getDocs(foldRef);
                folders = [];
                fSnap.forEach(f => folders.push(f.data()));

                renderSidebar();
                showToast("Archive Synchronized");
            } catch (err) {
                console.error("Archive sync error:", err);
            }
        }

        // Action: Preserve (Save)
        window.saveDocument = async () => {
            const title = document.getElementById('doc-title').value.trim() || 'Archival Record';
            const content = quill ? quill.root.innerHTML : "";
            const existing = documents.find(d => d.id === currentDocumentId);
            const id = currentDocumentId || Math.random().toString(36).substr(2, 10);
            
            const data = { 
                id, 
                title, 
                content, 
                folderId: currentFolderId || 'root', 
                created_at: existing?.created_at || new Date().toISOString(),
                preserved_at: new Date().toISOString()
            };
            
            // Update local memory
            if(existing) Object.assign(existing, data); else documents.push(data);
            currentDocumentId = id;
            
            // Database Sync
            if (db && currentUser) {
                try {
                    const docPath = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'space_docs', id);
                    await setDoc(docPath, data);
                    showToast("Record Preserved");
                } catch (err) {
                    showToast("Preservation Failed");
                }
            } else {
                localStorage.setItem('eternal_docs', JSON.stringify(documents));
                showToast("Local Preservation Active");
            }
            
            renderSidebar();
            document.getElementById('delete-btn').classList.remove('hidden');
        };

        // Action: Establish Sector (Folder)
        window.submitNewFolder = async () => {
            const name = document.getElementById('folder-name-input').value.trim();
            if(!name) return;
            
            const f = { 
                id: Math.random().toString(36).substr(2, 10), 
                name, 
                created_at: new Date().toISOString() 
            };
            
            folders.push(f);
            closeFolderModal();

            if (db && currentUser) {
                try {
                    const foldPath = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'space_folders', f.id);
                    await setDoc(foldPath, f);
                } catch (e) { console.error(e); }
            } else {
                localStorage.setItem('eternal_folders', JSON.stringify(folders));
            }
            renderSidebar();
        };

        // Action: Purge (Delete Doc)
        window.deleteCurrentDocument = async () => {
            if(!currentDocumentId) return;
            const id = currentDocumentId;
            documents = documents.filter(d => d.id !== id);
            
            if (db && currentUser) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'space_docs', id));
                } catch (e) { console.error(e); }
            } else {
                localStorage.setItem('eternal_docs', JSON.stringify(documents));
            }
            
            createNewDocument(currentFolderId);
            showToast("Record Purged");
        };

        // UI Helpers
        window.enterWorkspace = () => {
            const h = document.getElementById('homepage-overlay'), w = document.getElementById('workspace-overlay');
            h.style.opacity = '0'; h.style.transform = 'scale(1.05)';
            w.classList.remove('hidden'); 
            setTimeout(() => {
                h.classList.add('hidden');
                w.classList.remove('opacity-0', 'pointer-events-none');
                w.classList.add('opacity-100', 'pointer-events-auto');
                renderSidebar();
                if (documents.length === 0 && !currentDocumentId) createNewDocument('root');
            }, 500);
        };

        window.exitWorkspace = () => {
            const h = document.getElementById('homepage-overlay'), w = document.getElementById('workspace-overlay');
            w.classList.add('opacity-0', 'pointer-events-none');
            h.classList.remove('hidden');
            setTimeout(() => { h.style.opacity = '1'; h.style.transform = 'scale(1)'; }, 50);
            setTimeout(() => { w.classList.add('hidden'); }, 600);
        };

        window.toggleSidebar = () => {
            const s = document.getElementById('sidebar'), b = document.getElementById('sidebar-backdrop');
            const hidden = s.classList.contains('-translate-x-[110%]');
            if(hidden) { s.classList.remove('-translate-x-[110%]'); b.classList.add('opacity-100', 'pointer-events-auto'); }
            else { s.classList.add('-translate-x-[110%]'); b.classList.remove('opacity-100', 'pointer-events-auto'); }
        };

        window.toggleCommandMenu = () => {
            const m = document.getElementById('command-menu'), c = document.getElementById('command-caret');
            const act = m.classList.toggle('active');
            c.classList.toggle('rotate-180', act);
        };

        window.createNewDocument = (fid = 'root') => {
            currentDocumentId = null; currentFolderId = fid;
            document.getElementById('doc-title').value = '';
            if (quill) quill.root.innerHTML = '';
            document.getElementById('delete-btn').classList.add('hidden');
            renderSidebar();
            if(window.innerWidth < 1024) toggleSidebar();
            document.getElementById('command-menu').classList.remove('active');
            document.getElementById('command-caret').classList.remove('rotate-180');
        };

        window.deleteDocumentById = async (e, id) => {
            e.stopPropagation();
            if(id === currentDocumentId) { window.deleteCurrentDocument(); return; }
            documents = documents.filter(d => d.id !== id);
            if (db && currentUser) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'space_docs', id));
            } else {
                localStorage.setItem('eternal_docs', JSON.stringify(documents));
            }
            renderSidebar(); 
            showToast("Purged");
        };

        window.deleteFolder = async (e, id) => {
            e.stopPropagation();
            documents.forEach(d => { if(d.folderId === id) d.folderId = 'root'; });
            folders = folders.filter(f => f.id !== id);
            if(currentFolderId === id) currentFolderId = null;
            if (db && currentUser) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'space_folders', id));
            } else {
                localStorage.setItem('eternal_folders', JSON.stringify(folders));
            }
            renderSidebar();
        };

        window.openDocument = (id) => {
            const d = documents.find(d => d.id === id);
            if(!d) return;
            currentDocumentId = d.id; currentFolderId = d.folderId;
            document.getElementById('doc-title').value = d.title;
            if (quill) quill.root.innerHTML = d.content;
            document.getElementById('delete-btn').classList.remove('hidden');
            renderSidebar();
            if(window.innerWidth < 1024) toggleSidebar();
        };

        window.openFolderModal = () => {
            document.getElementById('folder-modal').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('folder-modal-content').classList.remove('scale-95');
            document.getElementById('command-menu').classList.remove('active');
        };

        window.closeFolderModal = () => {
            document.getElementById('folder-modal').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('folder-modal-content').classList.add('scale-95');
        };

        window.openFolder = (id) => { currentFolderId = id; renderSidebar(); };
        window.goBackToFolders = () => { currentFolderId = null; renderSidebar(); };

        window.toggleFullscreen = () => {
            const icons = [document.getElementById('fullscreen-icon'), document.getElementById('fullscreen-icon-home')];
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
                icons.forEach(i => { if(i) i.className = 'ph ph-corners-in text-xl'; });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                icons.forEach(i => { if(i) i.className = 'ph ph-corners-out text-xl'; });
            }
        };

        function renderSidebar() {
            const cont = document.getElementById('sidebar-content');
            if(!cont) return;
            let html = '';
            const bread = document.getElementById('current-loc-label');
            if (currentFolderId === null) {
                if (bread) bread.innerText = 'CORE ARCHIVE';
                html += `<div onclick="openFolder('root')" class="sidebar-item p-4 rounded-xl cursor-pointer flex justify-between items-center group transition-all ${currentFolderId === 'root' ? 'active' : 'hover:bg-white/[0.04]'}">
                    <div class="flex items-center gap-4"><i class="ph ph-archive text-slate-500 text-lg"></i><span class="text-[10px] font-bold uppercase text-slate-300">Root Records</span></div>
                    <span class="text-[9px] text-slate-600 font-black opacity-60">${documents.filter(d => d.folderId === 'root').length}</span>
                </div>`;
                folders.forEach(f => {
                    html += `<div onclick="openFolder('${f.id}')" class="sidebar-item p-4 rounded-xl cursor-pointer flex justify-between items-center group transition-all hover:bg-white/[0.04]">
                        <div class="flex items-center gap-4 min-w-0"><i class="ph ph-folder text-slate-600 text-lg flex-shrink-0"></i><span class="text-[10px] font-bold uppercase text-slate-200 truncate">${f.name}</span></div>
                        <div class="flex items-center gap-4 opacity-0 group-hover:opacity-100 transition-all">
                            <i class="ph ph-trash text-slate-700 hover:text-red-900 p-1" onclick="deleteFolder(event, '${f.id}')"></i>
                        </div>
                    </div>`;
                });
            } else {
                const f = folders.find(fold => fold.id === currentFolderId);
                if (bread) bread.innerText = currentFolderId === 'root' ? 'ROOT SECTOR' : f?.name.toUpperCase();
                html += `<button onclick="goBackToFolders()" class="text-slate-500 hover:text-white text-[9px] font-black uppercase flex items-center gap-2 mb-8 transition-all px-2"><i class="ph ph-arrow-left"></i> Systems Return</button>`;
                const filtered = documents.filter(d => d.folderId === currentFolderId);
                if (filtered.length === 0) {
                   html += `<p class="px-2 text-[8px] text-slate-600 uppercase tracking-widest italic">No records initialized.</p>`;
                }
                filtered.forEach(d => {
                    const active = d.id === currentDocumentId;
                    html += `<div onclick="openDocument('${d.id}')" class="sidebar-item p-4 rounded-xl cursor-pointer flex justify-between items-center group transition-all ${active ? 'active' : 'hover:bg-white/[0.03]'}">
                        <span class="text-[10px] font-bold uppercase text-slate-300 truncate mr-2">${d.title}</span>
                        <i class="ph ph-trash text-slate-800 hover:text-red-900 opacity-0 group-hover:opacity-100 transition-all p-1" onclick="deleteDocumentById(event, '${d.id}')"></i>
                    </div>`;
                });
            }
            cont.innerHTML = html;
        }

        function showToast(m) {
            const cont = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `glass-panel border-white/10 p-4 md:p-5 rounded-2xl flex items-center gap-4 shadow-3xl pointer-events-auto transition-all duration-500 opacity-100`;
            t.innerHTML = `<i class="ph ph-circle-wavy-check text-slate-400"></i><p class="text-[9px] font-bold uppercase text-slate-200 tracking-widest">${m}</p>`;
            cont.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 600); }, 3000);
        }

        function loadLocalBackup() {
            const ld = localStorage.getItem('eternal_docs'), lf = localStorage.getItem('eternal_folders');
            if (ld) documents = JSON.parse(ld);
            if (lf) folders = JSON.parse(lf);
            renderSidebar();
        }

        function initStars() {
            const cont = document.getElementById('canvas-container');
            if (!cont) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.z = 1000;
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            cont.appendChild(renderer.domElement);
            
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            const starTexture = new THREE.CanvasTexture(canvas);

            const spectral = [0x9bb0ff, 0xaabfff, 0xffffff, 0xfbf8ff, 0xfff4e8, 0xffddb4, 0xffbd6f];
            const starLayers = [];

            const createLayer = (count, zRange, size, speed) => {
                const geo = new THREE.BufferGeometry();
                const pos = new Float32Array(count * 3);
                const col = new Float32Array(count * 3);
                for(let i=0; i < count; i++) {
                    pos[i*3] = (Math.random() - 0.5) * 4000;
                    pos[i*3+1] = (Math.random() - 0.5) * 4000;
                    pos[i*3+2] = (Math.random() - 0.5) * zRange;
                    const c = new THREE.Color(spectral[Math.floor(Math.random() * spectral.length)]);
                    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
                const mat = new THREE.PointsMaterial({ size, map: starTexture, vertexColors: true, transparent: true, opacity: 0.8, depthWrite: false, blending: THREE.AdditiveBlending });
                const points = new THREE.Points(geo, mat);
                scene.add(points);
                return { points, speed, count };
            };

            starLayers.push(createLayer(3000, 4000, 2.0, 0.4));
            starLayers.push(createLayer(2000, 3000, 3.5, 0.8));
            starLayers.push(createLayer(1000, 2000, 5.5, 1.8));

            const animate = () => {
                requestAnimationFrame(animate);
                starLayers.forEach(layer => {
                    const positions = layer.points.geometry.attributes.position.array;
                    for (let i = 0; i < layer.count; i++) {
                        const zIdx = i * 3 + 2;
                        positions[zIdx] += layer.speed;
                        if (positions[zIdx] > 1000) positions[zIdx] = -3000;
                    }
                    layer.points.geometry.attributes.position.needsUpdate = true;
                });
                renderer.render(scene, camera);
            };
            animate();
            window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); });
        }

        function initEditor() {
            if (typeof Quill === 'undefined') return;
            try {
                if (window.QuillBlotFormatter) {
                    const b = QuillBlotFormatter.default || QuillBlotFormatter;
                    Quill.register('modules/blotFormatter', b);
                }
                
                const Font = Quill.import('formats/font');
                Font.whitelist = ['inter', 'cinzel', 'garamond', 'playfair', 'jetbrains'];
                Quill.register(Font, true);
                
                quill = new Quill('#editor', {
                    theme: 'snow',
                    placeholder: 'Preserve archival data...',
                    modules: { 
                        toolbar: [
                            [{ 'font': Font.whitelist }],
                            [{ 'size': ['small', false, 'large', 'huge'] }],
                            ['bold', 'italic', 'underline'],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'align': [] }],
                            ['blockquote', 'code-block', 'formula'],
                            ['clean']
                        ],
                        blotFormatter: {} 
                    }
                });
                quill.root.classList.add('ql-font-inter');
            } catch (err) { console.error(err); }
        }

        window.addEventListener('DOMContentLoaded', initSystems);
    </script>
</body>
