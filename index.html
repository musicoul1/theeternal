<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eternal | Infinite Archives</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <!-- Quill.js -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- Quill Blot Formatter -->
    <script src="https://cdn.jsdelivr.net/npm/quill-blot-formatter@1.0.5/dist/quill-blot-formatter.min.js"></script>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            background-color: #000; color: #e2e8f0; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; 
        }
        @media (min-width: 768px) { body { flex-direction: row; } }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* Premium Glassmorphism */
        .glass-panel {
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .ql-toolbar.ql-snow {
            border: none;
            background: rgba(15, 15, 20, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        
        .ql-toolbar.ql-snow .ql-formats {
            margin-right: 10px !important;
            padding-right: 10px !important;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ql-container.ql-snow {
            border: none !important;
            color: #f1f5f9;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.015em;
        }

        .ql-editor { 
            padding: 2rem 2.5rem; 
            line-height: 1.7;
            font-family: 'Inter', sans-serif;
        }

        .ql-snow .ql-stroke { stroke: #94a3b8; stroke-width: 1.2px; }
        .ql-snow .ql-fill { fill: #94a3b8; }
        .ql-snow .ql-picker { color: #94a3b8; font-size: 11px; font-weight: 500; }
        .ql-snow .ql-picker-options { 
            background-color: #0c0c0e !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            box-shadow: 0 10px 40px rgba(0,0,0,1);
            border-radius: 8px;
            padding: 6px !important;
        }

        .toast-enter { transform: translateY(20px); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .pin-icon.pinned { color: #fbbf24; filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.4)); }
        
        .logo-glow {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            letter-spacing: 0.25em;
        }

        .premium-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-btn:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }

        .sidebar-item {
            transition: all 0.2s ease;
            position: relative;
        }
        .sidebar-item::before {
            content: '';
            position: absolute;
            left: 0; top: 25%; bottom: 25%; width: 2px;
            background: #60a5fa;
            border-radius: 0 4px 4px 0;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .sidebar-item.active::before { opacity: 1; }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .workspace-transition {
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Command Menu Styles */
        #command-menu {
            transform: translateY(10px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #command-menu.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .command-item {
            transition: all 0.2s ease;
        }
        .command-item:hover {
            background: rgba(255, 255, 255, 0.05);
            padding-left: 1.25rem;
        }
    </style>
</head>
<body class="antialiased relative overflow-hidden bg-black text-gray-200">

    <!-- Deep Space Engine -->
    <div id="canvas-container" class="absolute inset-0 z-0 pointer-events-none"></div>

    <!-- CINEMATIC HOMEPAGE -->
    <div id="homepage-overlay" class="absolute inset-0 z-30 flex flex-col items-center justify-center bg-black/30 transition-all duration-700 ease-in-out">
        <div class="flex flex-col items-center text-center px-6">
            <div class="mb-6">
                <i class="ph ph-infinity text-4xl text-white/40 drop-shadow-[0_0_20px_rgba(255,255,255,0.2)]"></i>
            </div>
            <h1 class="text-5xl md:text-8xl font-bold text-white mb-6 logo-glow" style="font-family: 'Cinzel', serif;">
                THE ETERNAL
            </h1>
            <p class="text-gray-400 tracking-[0.6em] font-light mb-12 uppercase text-[10px] md:text-xs opacity-60">
                I n f i n i t e &nbsp; A r c h i v a l &nbsp; C o r e
            </p>
            
            <button onclick="enterWorkspace()" class="premium-btn group py-4 px-12 text-white rounded-full font-medium transition-all backdrop-blur-md uppercase tracking-[0.3em] text-[9px] shadow-2xl relative overflow-hidden">
                <span class="relative z-10 flex items-center gap-3">
                    Enter Workspace <i class="ph ph-arrow-right text-base transition-transform group-hover:translate-x-1"></i>
                </span>
                <div class="shimmer absolute inset-0"></div>
            </button>
        </div>
        <div class="absolute bottom-10 text-[9px] text-gray-600 tracking-[0.4em] uppercase opacity-40">
            Archival Sync Status: Ready
        </div>
    </div>

    <!-- PREMIUM WORKSPACE -->
    <div id="workspace-overlay" class="workspace-transition absolute inset-0 z-10 flex w-full h-full p-3 md:p-4 gap-3 md:gap-4 bg-black/10 opacity-0 pointer-events-none">
        
        <!-- Premium Sidebar -->
        <aside class="glass-panel w-full md:w-72 flex-shrink-0 rounded-3xl flex flex-col overflow-hidden z-20 hidden md:flex" id="sidebar">
            <!-- Header -->
            <div class="p-6 border-b border-white/5 flex items-center justify-between">
                <div class="flex flex-col gap-0.5 cursor-pointer group" onclick="exitWorkspace()">
                    <div class="flex items-center gap-2.5">
                        <i class="ph ph-infinity text-xl text-white group-hover:text-blue-400 transition-colors"></i>
                        <h1 class="text-lg font-bold tracking-[0.1em] text-white" style="font-family: 'Cinzel', serif;">ETERNAL</h1>
                    </div>
                    <span class="text-[8px] tracking-[0.25em] text-gray-500 uppercase font-light">Archival Sector</span>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-500"><i class="ph ph-x text-xl"></i></button>
            </div>

            <!-- Main Content Area -->
            <div id="sidebar-content" class="flex flex-col flex-1 overflow-hidden relative">
                <!-- Navigation UI will be rendered here -->
            </div>

            <!-- Bottom Command Hub (Dropdown/Drop-up) -->
            <div class="p-4 border-t border-white/5 relative bg-black/40">
                <!-- Drop-up Menu -->
                <div id="command-menu" class="absolute left-4 right-4 bottom-20 glass-panel rounded-2xl overflow-hidden border border-white/10 z-30">
                    <button onclick="createNewDocument('root')" class="command-item w-full p-4 flex items-center gap-4 text-left border-b border-white/5">
                        <i class="ph ph-plus-circle text-blue-400 text-lg"></i>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold uppercase tracking-widest text-white">Initialize Record</span>
                            <span class="text-[8px] text-gray-500 uppercase tracking-tighter">New text archival entry</span>
                        </div>
                    </button>
                    <button onclick="openFolderModal()" class="command-item w-full p-4 flex items-center gap-4 text-left">
                        <i class="ph ph-folder-plus text-blue-400 text-lg"></i>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold uppercase tracking-widest text-white">Establish Sector</span>
                            <span class="text-[8px] text-gray-500 uppercase tracking-tighter">New containment folder</span>
                        </div>
                    </button>
                </div>

                <!-- Main Toggle Button -->
                <button id="command-toggle" onclick="toggleCommandMenu()" class="premium-btn w-full py-3.5 px-4 text-white rounded-xl text-[9px] font-bold uppercase tracking-[0.3em] transition-all flex items-center justify-between group">
                    <span class="flex items-center gap-3">
                        <i class="ph ph-command text-base text-blue-400"></i>
                        Initialize
                    </span>
                    <i class="ph ph-caret-up text-gray-500 group-hover:text-white transition-transform duration-300" id="command-caret"></i>
                </button>
            </div>

            <!-- Footer Stats -->
            <div class="p-4 border-t border-white/5 text-[8px] text-gray-500 flex items-center justify-between tracking-[0.2em] uppercase bg-black/60">
                <span id="db-status" class="flex items-center gap-2">
                    <div class="w-1 h-1 rounded-full bg-red-500 shadow-[0_0_6px_rgba(239,68,68,0.5)]" id="status-dot"></div> OFFLINE
                </span>
                <div class="flex gap-3">
                    <i class="ph ph-shield-check text-sm hover:text-blue-400 cursor-pointer transition-colors"></i>
                    <i class="ph ph-gear text-sm hover:text-white cursor-pointer transition-colors"></i>
                </div>
            </div>
        </aside>

        <!-- Premium Editor Main Panel -->
        <main class="flex-1 glass-panel rounded-[2rem] flex flex-col overflow-hidden h-full relative z-10">
            <header class="px-5 py-4 md:px-8 md:py-6 border-b border-white/5 flex items-center justify-between bg-white/[0.01]">
                <div class="flex items-center gap-5 flex-1">
                    <button onclick="toggleSidebar()" class="md:hidden text-gray-400"><i class="ph ph-list text-2xl"></i></button>
                    <div class="flex flex-col gap-0.5 w-full max-w-xl">
                        <input type="text" id="doc-title" placeholder="Designation..." class="bg-transparent text-xl md:text-2xl font-bold text-white outline-none w-full focus:text-blue-200 transition-all placeholder:opacity-10" value="Untitled Record" style="font-family: 'Cinzel', serif;">
                        <div id="breadcrumb" class="text-[8px] uppercase tracking-[0.25em] text-gray-500 font-light flex items-center gap-2">
                            Archive <i class="ph ph-caret-right text-[7px]"></i> <span id="current-loc-label">Root Sector</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2.5">
                    <button onclick="toggleCurrentDocPin()" id="pin-btn" class="hidden p-2 text-gray-500 hover:text-yellow-400 transition-all rounded-lg hover:bg-white/5" title="Pin entry">
                        <i class="ph ph-push-pin text-lg pin-icon" id="header-pin-icon"></i>
                    </button>
                    <button onclick="deleteCurrentDocument()" id="delete-btn" class="hidden p-2 text-red-500/30 hover:text-red-500 transition-all rounded-lg hover:bg-red-500/5" title="Purge entry">
                        <i class="ph ph-trash-simple text-lg"></i>
                    </button>
                    <button onclick="saveDocument()" class="ml-2 py-3 px-6 bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-xl text-[9px] font-bold uppercase tracking-[0.2em] transition-all flex items-center gap-2">
                        <i class="ph ph-floppy-disk text-sm"></i> Preserve
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto bg-black/10">
                <div class="max-w-4xl mx-auto min-h-full py-8 px-5 md:px-0">
                    <div id="editor" class="flex-1"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="folder-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-500">
        <div class="glass-panel p-8 rounded-[2rem] max-w-sm w-full border border-white/10 scale-95 transition-all shadow-[0_0_80px_rgba(0,0,0,1)]" id="folder-modal-content">
            <h2 class="text-xl font-bold tracking-[0.1em] mb-2 uppercase text-white" style="font-family: 'Cinzel', serif;">New Archival Sector</h2>
            <p class="text-[9px] text-gray-500 mb-8 tracking-[0.2em] uppercase font-light">Initialize a new containment unit.</p>
            <input type="text" id="folder-name-input" placeholder="Designation..." class="w-full bg-white/[0.03] border border-white/10 rounded-xl px-4 py-3 text-white outline-none text-xs mb-8 focus:border-blue-500/50 transition-all">
            <div class="flex gap-3">
                <button onclick="closeFolderModal()" class="flex-1 py-3 text-gray-500 text-[9px] font-bold uppercase tracking-[0.2em] hover:text-white transition-colors">Cancel</button>
                <button onclick="submitNewFolder()" class="flex-1 py-3 bg-white/5 border border-white/20 text-white rounded-xl font-bold text-[9px] uppercase tracking-[0.2em] hover:bg-white/10 transition-colors">Establish</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-8 right-8 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArmDPmEovOn8FAWggCukVDNW_jizbx4PY",
            authDomain: "the-eternal-550ce.firebaseapp.com",
            projectId: "the-eternal-550ce",
            storageBucket: "the-eternal-550ce.firebasestorage.app",
            messagingSenderId: "610399696800",
            appId: "1:610399696800:web:39d2b9c70a4a7ae3aa96c5",
            measurementId: "G-5FF7E755H8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const APP_ID = 'the-eternal-550ce';
        let currentUser = null;
        let isLocalMode = false;
        let quill = null;
        let folders = [];
        let documents = [];
        let currentFolderId = null;
        let currentDocumentId = null;

        // Command Menu Logic
        window.toggleCommandMenu = () => {
            const menu = document.getElementById('command-menu');
            const caret = document.getElementById('command-caret');
            const isActive = menu.classList.toggle('active');
            
            if (isActive) {
                caret.classList.add('rotate-180');
            } else {
                caret.classList.remove('rotate-180');
            }
        };

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('command-menu');
            const toggle = document.getElementById('command-toggle');
            if (!menu.contains(e.target) && !toggle.contains(e.target)) {
                menu.classList.remove('active');
                document.getElementById('command-caret').classList.remove('rotate-180');
            }
        });

        // Exposed global functions
        window.enterWorkspace = () => {
            document.getElementById('homepage-overlay').style.opacity = '0';
            document.getElementById('homepage-overlay').style.transform = 'scale(1.02)';
            setTimeout(() => {
                document.getElementById('homepage-overlay').classList.add('hidden');
                document.getElementById('workspace-overlay').classList.remove('opacity-0', 'pointer-events-none');
                // Ensure initial view is rendered
                renderSidebar();
            }, 500);
        };
        window.exitWorkspace = () => {
            document.getElementById('workspace-overlay').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('homepage-overlay').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('homepage-overlay').style.opacity = '1';
                document.getElementById('homepage-overlay').style.transform = 'scale(1)';
            }, 50);
        };
        window.createNewDocument = (folderId = 'root') => {
            currentDocumentId = null;
            currentFolderId = folderId;
            document.getElementById('doc-title').value = '';
            quill.root.innerHTML = '';
            document.getElementById('delete-btn').classList.add('hidden');
            document.getElementById('pin-btn').classList.add('hidden');
            renderSidebar();
            if(window.innerWidth < 768) toggleSidebar();
            // Close command menu if open
            document.getElementById('command-menu').classList.remove('active');
        };
        
        window.saveDocument = async () => {
            const title = document.getElementById('doc-title').value.trim() || 'Untitled Record';
            const content = quill.root.innerHTML;
            const existing = documents.find(d => d.id === currentDocumentId);
            const id = currentDocumentId || generateId();
            const data = { 
                id, title, content, 
                folderId: currentFolderId || 'root', 
                pinned: existing ? existing.pinned : false, 
                created_at: existing ? existing.created_at : new Date().toISOString() 
            };
            
            if(existing) Object.assign(existing, data); else documents.push(data);
            currentDocumentId = id;
            updateHeaderPinUI();
            renderSidebar();
            showToast("Archive Preserved", "success");
            document.getElementById('delete-btn').classList.remove('hidden');
            document.getElementById('pin-btn').classList.remove('hidden');

            if (!isLocalMode) {
                setDoc(doc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'space_docs'), id), data).catch(console.error);
            }
        };

        window.deleteCurrentDocument = async () => {
            if(!currentDocumentId) return;
            const id = currentDocumentId;
            documents = documents.filter(d => d.id !== id);
            createNewDocument(currentFolderId);
            showToast("Entry Purged", "success");
            if(!isLocalMode) {
                deleteDoc(doc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'space_docs'), id)).catch(console.error);
            }
        };

        window.openDocument = (id) => {
            const d = documents.find(d => d.id === id);
            if(!d) return;
            currentDocumentId = d.id;
            currentFolderId = d.folderId;
            document.getElementById('doc-title').value = d.title;
            quill.root.innerHTML = d.content;
            document.getElementById('delete-btn').classList.remove('hidden');
            document.getElementById('pin-btn').classList.remove('hidden');
            updateHeaderPinUI();
            renderSidebar();
            if(window.innerWidth < 768) toggleSidebar();
        };

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('hidden');
        
        window.openFolderModal = () => {
            document.getElementById('folder-modal').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('folder-modal-content').classList.remove('scale-95');
            document.getElementById('command-menu').classList.remove('active');
        };

        window.closeFolderModal = () => {
            document.getElementById('folder-modal').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('folder-modal-content').classList.add('scale-95');
        };

        window.submitNewFolder = async () => {
            const name = document.getElementById('folder-name-input').value.trim();
            if(!name) return;
            const newF = { id: generateId(), name, pinned: false, created_at: new Date().toISOString() };
            folders.push(newF);
            closeFolderModal();
            renderSidebar();
            showToast("Sector Established", "success");
            if (!isLocalMode) {
                setDoc(doc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'space_folders'), newF.id), newF).catch(console.error);
            }
        };

        window.openFolder = (id) => {
            currentFolderId = id;
            renderSidebar();
        };
        window.goBackToFolders = () => {
            currentFolderId = null;
            renderSidebar();
        };
        window.toggleFolderPin = (e, fid) => {
            e.stopPropagation();
            const f = folders.find(f => f.id === fid);
            if(f) {
                f.pinned = !f.pinned;
                renderSidebar();
                if(!isLocalMode) setDoc(doc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'space_folders'), fid), f);
            }
        };
        window.toggleDocPin = (e, did) => {
            e.stopPropagation();
            const d = documents.find(d => d.id === did);
            if(d) {
                d.pinned = !d.pinned;
                updateHeaderPinUI();
                renderSidebar();
                if(!isLocalMode) setDoc(doc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'space_docs'), did), d);
            }
        };
        window.toggleCurrentDocPin = () => {
            if(currentDocumentId) window.toggleDocPin({stopPropagation: ()=>{}}, currentDocumentId);
        };

        function generateId() {
            return Math.random().toString(36).substr(2, 10);
        }

        function initSpaceSimulation() {
            if (typeof THREE === 'undefined') { setTimeout(initSpaceSimulation, 200); return; }
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0004);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
            camera.position.z = 500;
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const context = canvas.getContext('2d');
            const grad = context.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = grad;
            context.fillRect(0, 0, 16, 16);
            const texture = new THREE.CanvasTexture(canvas);

            const starLayers = [];
            const createStarLayer = (count, size, speed, zRange, opacity) => {
                const geometry = new THREE.BufferGeometry();
                const pos = new Float32Array(count * 3);
                for(let i = 0; i < count * 3; i+=3) {
                    pos[i] = (Math.random() - 0.5) * 4000;
                    pos[i+1] = (Math.random() - 0.5) * 4000;
                    pos[i+2] = (Math.random() - 0.5) * zRange - 500;
                }
                geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const material = new THREE.PointsMaterial({ size, map: texture, transparent: true, opacity, blending: THREE.AdditiveBlending, depthWrite: false });
                const mesh = new THREE.Points(geometry, material);
                scene.add(mesh);
                starLayers.push({ mesh, speed, zRange });
            };

            createStarLayer(8000, 3, 0.4, 3000, 0.5);
            createStarLayer(4000, 6, 0.8, 3000, 0.7);
            createStarLayer(1000, 15, 2.5, 3000, 0.9);

            const animate = () => {
                requestAnimationFrame(animate);
                starLayers.forEach(l => {
                    const pos = l.mesh.geometry.attributes.position.array;
                    for(let i = 2; i < pos.length; i += 3) {
                        pos[i] += l.speed;
                        if(pos[i] > 600) pos[i] -= l.zRange;
                    }
                    l.mesh.geometry.attributes.position.needsUpdate = true;
                });
                renderer.render(scene, camera);
            };
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        function initEditor() {
            if (typeof window.Quill === 'undefined' || typeof window.QuillBlotFormatter === 'undefined') {
                setTimeout(initEditor, 200); return;
            }
            try {
                const blotFormatterModule = QuillBlotFormatter.default || QuillBlotFormatter;
                Quill.register('modules/blotFormatter', blotFormatterModule);

                const Font = Quill.import('formats/font');
                Font.whitelist = ['inter', 'cinzel', 'courier'];
                Quill.register(Font, true);

                const toolbarOptions = [
                    [{ 'font': ['inter', 'cinzel', 'courier'] }, { 'size': ['small', false, 'large', 'huge'] }],
                    [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    ['blockquote', 'code-block', 'formula'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ];

                quill = new Quill('#editor', {
                    theme: 'snow',
                    placeholder: 'Begin data transcription...',
                    modules: { toolbar: toolbarOptions, blotFormatter: {} }
                });
                
                quill.root.classList.add('ql-font-inter');
                addTooltips();
            } catch (err) { console.error(err); }
        }

        function addTooltips() {
            const tips = {
                'ql-font': 'Archive Font', 'ql-size': 'Volume', 'ql-header': 'Priority',
                'ql-bold': 'Bold (Ctrl+B)', 'ql-italic': 'Italic (Ctrl+I)', 'ql-underline': 'Underline (Ctrl+U)',
                'ql-strike': 'Strike', 'ql-color': 'Hue', 'ql-background': 'Field Highlight',
                'ql-blockquote': 'Citation', 'ql-code-block': 'Technical', 'ql-formula': 'Mathematical',
                'ql-list[value="ordered"]': 'Sequence', 'ql-list[value="bullet"]': 'Nodes',
                'ql-align': 'Alignment', 'ql-link': 'Vector Link', 'ql-image': 'Visual Matrix',
                'ql-video': 'Feed', 'ql-clean': 'Purge Styles'
            };
            Object.keys(tips).forEach(sel => {
                const elements = document.querySelectorAll(`.${sel}`);
                elements.forEach(el => el.setAttribute('title', tips[sel]));
            });
        }

        async function initializeDatabase() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) { 
                        currentUser = user; 
                        isLocalMode = false; 
                        const dot = document.getElementById('status-dot');
                        if (dot) {
                            dot.style.backgroundColor = '#60a5fa';
                            dot.style.boxShadow = '0 0 8px #60a5fa';
                        }
                        const statusText = document.getElementById('db-status');
                        if (statusText) statusText.innerHTML = '<div class="w-1.5 h-1.5 rounded-full bg-blue-400 shadow-[0_0_6px_#60a5fa]" id="status-dot"></div> UPLINK ESTABLISHED';
                        loadAllData(); 
                    }
                });
            } catch (err) {
                isLocalMode = true; currentUser = { uid: 'local' }; renderSidebar();
            }
        }

        async function loadAllData() {
            if (isLocalMode) return;
            try {
                const dSnap = await getDocs(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'space_docs'));
                documents = []; dSnap.forEach(d => documents.push(d.data()));
                const fSnap = await getDocs(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'space_folders'));
                folders = []; fSnap.forEach(f => folders.push(f.data()));
                renderSidebar();
            } catch (e) { console.error(e); }
        }

        function updateHeaderPinUI() {
            const d = documents.find(d => d.id === currentDocumentId);
            const p = document.getElementById('header-pin-icon');
            if(d?.pinned) p.classList.add('ph-fill', 'pinned'); else p.classList.remove('ph-fill', 'pinned');
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-content');
            if (!container) return;
            
            let html = '';
            const sorter = (a, b) => (a.pinned === b.pinned ? new Date(b.created_at) - new Date(a.created_at) : a.pinned ? -1 : 1);

            const activeFolder = folders.find(f => f.id === currentFolderId);
            const breadcrumbLabel = currentFolderId === 'root' ? 'Root Sector' : (activeFolder ? activeFolder.name : 'Root Sector');
            const labelEl = document.getElementById('current-loc-label');
            if(labelEl) labelEl.innerText = breadcrumbLabel;

            if (currentFolderId === null) {
                // Main list view
                html += `
                    <div class="flex-1 overflow-y-auto px-3.5 pb-8 pt-6 space-y-1">
                        <div onclick="openFolder('root')" class="sidebar-item p-3.5 rounded-xl border border-transparent hover:bg-white/[0.03] cursor-pointer flex justify-between items-center transition-all group ${currentFolderId === 'root' ? 'active bg-white/[0.04]' : ''}">
                            <div class="flex items-center gap-3">
                                <i class="ph ph-archive text-gray-500 text-lg"></i>
                                <span class="text-[9px] font-bold tracking-[0.15em] uppercase text-gray-400">Root Archive</span>
                            </div>
                            <div class="flex items-center gap-3.5">
                                <span class="text-[8px] text-gray-600 font-mono">${documents.filter(d => d.folderId === 'root').length}</span>
                                <i class="ph ph-plus text-xs text-blue-400 opacity-0 group-hover:opacity-100 transition-all hover:scale-125" title="New Entry in Root" onclick="event.stopPropagation(); createNewDocument('root')"></i>
                            </div>
                        </div>
                `;

                folders.sort(sorter).forEach(f => {
                    const count = documents.filter(d => d.folderId === f.id).length;
                    html += `
                        <div onclick="openFolder('${f.id}')" class="sidebar-item p-3.5 rounded-xl border border-transparent hover:bg-white/[0.03] cursor-pointer flex justify-between items-center transition-all group ${currentFolderId === f.id ? 'active bg-white/[0.04]' : ''}">
                            <div class="flex items-center gap-3">
                                <i class="ph ph-folder text-blue-400/40 text-lg"></i>
                                <span class="text-[9px] font-bold tracking-[0.15em] uppercase text-gray-300 truncate max-w-[120px]">${f.name}</span>
                            </div>
                            <div class="flex items-center gap-3.5">
                                <i class="ph ph-plus text-xs text-blue-400 opacity-0 group-hover:opacity-100 transition-all hover:scale-125" title="New Entry in ${f.name}" onclick="event.stopPropagation(); createNewDocument('${f.id}')"></i>
                                <span class="text-[8px] text-gray-600 font-mono">${count}</span>
                                <i class="ph ph-push-pin ${f.pinned ? 'ph-fill pinned' : 'text-gray-700 hover:text-yellow-400'} transition-all" onclick="toggleFolderPin(event, '${f.id}')"></i>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            } else {
                // Focused folder view
                const folderName = currentFolderId === 'root' ? 'Root Archive' : activeFolder?.name;
                html += `
                    <div class="p-5 border-b border-white/5 bg-black/40">
                        <button onclick="goBackToFolders()" class="text-gray-500 hover:text-white text-[8px] tracking-[0.25em] uppercase flex items-center gap-2.5 transition-colors">
                            <i class="ph ph-arrow-left text-sm"></i> Back to Sectors
                        </button>
                    </div>
                    <div class="p-6 bg-black/10">
                        <h3 class="text-[9px] text-gray-400 uppercase tracking-[0.2em] font-medium flex items-center gap-2.5 mb-2">
                            <i class="ph ph-folder-open text-blue-400 text-base"></i> ${folderName}
                        </h3>
                    </div>
                    <div class="flex-1 overflow-y-auto p-3.5 space-y-1.5">
                `;
                const folderDocs = documents.filter(d => d.folderId === currentFolderId).sort(sorter);
                if(folderDocs.length === 0) {
                    html += `<div class="p-8 text-center text-gray-600 text-[8px] uppercase tracking-[0.25em] font-light">Void ... No entries</div>`;
                }
                folderDocs.forEach(d => {
                    const isActive = d.id === currentDocumentId;
                    html += `
                        <div onclick="openDocument('${d.id}')" class="sidebar-item p-3.5 rounded-xl border ${isActive ? 'bg-blue-600/10 border-blue-500/20' : 'border-transparent hover:bg-white/[0.03]'} cursor-pointer group relative pr-9 transition-all ${isActive ? 'active' : ''}">
                            <span class="text-[9px] font-bold uppercase tracking-[0.15em] text-gray-300 truncate block">${d.title || 'Untitled'}</span>
                            <i class="ph ph-push-pin absolute right-3.5 top-1/2 -translate-y-1/2 ${d.pinned ? 'ph-fill pinned' : 'text-gray-700 opacity-0 group-hover:opacity-100 hover:text-yellow-400'} transition-all" onclick="toggleDocPin(event, '${d.id}')"></i>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function showToast(m, t = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `glass-panel ${t === 'success' ? 'border-blue-500/20' : 'border-red-900/20'} border rounded-2xl p-4 flex items-center gap-3 toast-enter-active pointer-events-auto shadow-2xl`;
            toast.innerHTML = `<i class="ph ph-sparkle text-blue-400 text-lg"></i><p class="text-[9px] font-bold uppercase tracking-[0.15em] text-gray-200">${m}</p>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(12px)'; setTimeout(() => toast.remove(), 400); }, 3000);
        }

        window.onload = () => { initSpaceSimulation(); initEditor(); initializeDatabase(); };
    </script>
</body>
</html>
