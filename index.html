    <style>
        /* Base and Scrollbars */
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }
        @media (min-width: 768px) { body { flex-direction: row; } }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(10, 10, 12, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }

        /* Quill Editor Dark Theme Overrides */
        .ql-toolbar.ql-snow {
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 15, 18, 0.8);
            border-radius: 0.5rem 0.5rem 0 0;
            padding: 12px;
        }
        .ql-container.ql-snow {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: none;
            background: rgba(10, 10, 12, 0.6);
            border-radius: 0 0 0.5rem 0.5rem;
            color: #e2e8f0;

            font-family: 'Inter', sans-serif;
            font-weight: 300;
            line-height: 1.7;
        }
        .ql-editor { padding: 1.5rem; min-height: 60vh; }
        
        /* Advanced Image & Video Styling */
        .ql-editor img {
            max-width: 100%;
            border-radius: 0.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .ql-editor iframe.ql-video {
            width: 100%;
            min-height: 350px;
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin: 1rem 0;
        }

        /* Fix Blot Formatter UI in Dark Mode */
        .blot-formatter__overlay { border: 1px solid #cbd5e1 !important; }
        .blot-formatter__toolbar { 
            background-color: rgba(15, 15, 18, 0.95) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8) !important;
            backdrop-filter: blur(10px);
            border-radius: 0.5rem !important;
            z-index: 50 !important;
        }
        .blot-formatter__toolbar-button { color: #cbd5e1 !important; }
        .blot-formatter__toolbar-button:hover { color: #fff !important; background-color: rgba(255,255,255,0.1) !important; }

        /* Custom Fonts in Editor */
        .ql-font-cinzel { font-family: 'Cinzel', serif; }
        .ql-font-inter { font-family: 'Inter', sans-serif; }
        .ql-font-courier { font-family: 'Courier New', Courier, monospace; }

        /* Toolbar Icons Dark Mode Fix */
        .ql-snow .ql-stroke { stroke: #94a3b8; }
        .ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill { fill: #94a3b8; }
        .ql-snow .ql-picker { color: #94a3b8; }
        
        /* Picker Dropdowns (Fonts, Sizes, Colors) */
        .ql-snow .ql-picker-options { 
            background-color: rgba(15, 15, 18, 0.95) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        .ql-snow .ql-picker-item, .ql-snow .ql-picker-label { color: #cbd5e1 !important; }
        .ql-snow .ql-picker-item:hover, .ql-snow .ql-picker-label:hover { 
            color: #fff !important; 
            background-color: rgba(255,255,255,0.05);
        }
        .ql-snow .ql-picker-item.ql-selected { color: #9ca3af !important; }
        
        /* Editor Tooltips (Links, Formulas) */
        .ql-snow .ql-tooltip {
            background-color: rgba(15, 15, 18, 0.95) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            color: #fff;
            border-radius: 0.5rem;
            backdrop-filter: blur(10px);
        }
        .ql-snow .ql-tooltip input[type=text] {
            background-color: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 0.25rem;
        }
        .ql-snow .ql-tooltip a.ql-action::after { border-right: 1px solid rgba(255,255,255,0.2); }

        button.ql-active .ql-stroke { stroke: #f8fafc !important; }
        button.ql-active .ql-fill { fill: #f8fafc !important; }
        button:hover .ql-stroke { stroke: #cbd5e1 !important; }

        /* Animations */
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-enter-active { transform: translateY(0); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .pin-icon.pinned { color: #eab308; fill: #eab308; }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        /* =========================================
           GLOBAL STATE & CONSTANTS
           ========================================= */
        const firebaseConfig = {
            apiKey: "AIzaSyArmDPmEovOn8FAWggCukVDNW_jizbx4PY",
            authDomain: "the-eternal-550ce.firebaseapp.com",
            projectId: "the-eternal-550ce",
            storageBucket: "the-eternal-550ce.firebasestorage.app",
            messagingSenderId: "610399696800",
            appId: "1:610399696800:web:39d2b9c70a4a7ae3aa96c5",
            measurementId: "G-5FF7E755H8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const ARCHIVE_APP_ID = 'the-eternal-550ce';

        // Safe UUID generation fallback
        function generateId() {
            try {
                if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                    return crypto.randomUUID();
                }
            } catch(e) {}
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        /* =========================================
           THREE.JS SPACE SIMULATION
           ========================================= */
        function initSpaceSimulation() {
            if (typeof THREE === 'undefined') {
                setTimeout(initSpaceSimulation, 200);
                return;
            }

            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.001);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 500;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const particlesCount = 6000;
            const posArray = new Float32Array(particlesCount * 3);
            const colorsArray = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount * 3; i+=3) {
                posArray[i] = (Math.random() - 0.5) * 2000;
                posArray[i+1] = (Math.random() - 0.5) * 2000;
                posArray[i+2] = (Math.random() - 0.5) * 2000;

                const mix = Math.random();
                if(mix > 0.85) {
                    colorsArray[i] = 0.6; colorsArray[i+1] = 0.8; colorsArray[i+2] = 1.0; 
                } else if(mix < 0.05) {
                    colorsArray[i] = 1.0; colorsArray[i+1] = 0.8; colorsArray[i+2] = 0.6; 
                } else {
                    colorsArray[i] = 0.9; colorsArray[i+1] = 0.9; colorsArray[i+2] = 0.9; 
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 16, 16);
            const texture = new THREE.CanvasTexture(canvas);

            const material = new THREE.PointsMaterial({
                size: 3,
                map: texture,
                transparent: true,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const particlesMesh = new THREE.Points(geometry, material);
            scene.add(particlesMesh);

            const addNebula = (color, size, x, y, z, opacity) => {
                const nGeo = new THREE.SphereGeometry(size, 32, 32);
                const nMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: opacity, blending: THREE.AdditiveBlending });
                const nMesh = new THREE.Mesh(nGeo, nMat);
                nMesh.position.set(x,y,z);
                scene.add(nMesh);
            };
            addNebula(0x1a237e, 600, -300, 200, -600, 0.03);
            addNebula(0x311b92, 500, 400, -100, -500, 0.02);
            addNebula(0x4a148c, 700, 0, 200, -800, 0.02);

            let mouseX = 0;
            let mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - window.innerWidth / 2) * 0.0005;
                mouseY = (e.clientY - window.innerHeight / 2) * 0.0005;
            });

            const animate = () => {
                requestAnimationFrame(animate);
                particlesMesh.rotation.y += 0.00005;
                particlesMesh.rotation.x += 0.00002;
                camera.position.x += (mouseX * 50 - camera.position.x) * 0.02;
                camera.position.y += (-mouseY * 50 - camera.position.y) * 0.02;
                camera.lookAt(scene.position);
                renderer.render(scene, camera);
            };

            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        /* =========================================
           QUILL EDITOR INITIALIZATION
           ========================================= */
        function initEditor() {
            if (typeof window.Quill === 'undefined' || typeof window.QuillBlotFormatter === 'undefined') {
                setTimeout(initEditor, 200);
                return;
            }

            try {
                const Font = Quill.import('formats/font');
                Font.whitelist = ['inter', 'cinzel', 'courier'];
                Quill.register(Font, true);

                const toolbarOptions = [
                    [{ 'font': ['inter', 'cinzel', 'courier'] }, { 'size': ['small', false, 'large', 'huge'] }],
                    [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'script': 'sub'}, { 'script': 'super' }],
                    ['blockquote', 'code-block', 'formula'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'indent': '-1'}, { 'indent': '+1' }, { 'align': [] }, { 'direction': 'rtl' }],
                    ['link', 'image', 'video'],
                    ['clean']
                ];

                const modulesConfig = {
                    toolbar: toolbarOptions
                };

                // Register BlotFormatter safely
                Quill.register('modules/blotFormatter', window.QuillBlotFormatter.default || window.QuillBlotFormatter);
                modulesConfig.blotFormatter = {};

                quill = new Quill('#editor', {
                    theme: 'snow',
                    placeholder: 'Inscribe your records into the void...',
                    modules: modulesConfig
                });

                quill.root.classList.add('ql-font-inter');

                let timeout;
                quill.on('text-change', function() {
                    if (currentDocumentId) {
                        clearTimeout(timeout);
                        timeout = setTimeout(() => {
                            // Silent auto-save trigger can go here
                        }, 2000);
                    }
                });
            } catch (err) {
                console.error("Editor failed to initialize: ", err);
                document.getElementById('editor').innerHTML = `<div style="color: #ef4444; padding: 2rem; font-family: 'Inter', sans-serif;">Error loading the editor.</div>`;
            }
        }

        /* =========================================
           FIREBASE LOGIC
           ========================================= */
        function getDocsRef() {
            return collection(db, 'artifacts', ARCHIVE_APP_ID, 'users', currentUser.uid, 'space_docs');
        }
        function getFoldersRef() {
            return collection(db, 'artifacts', ARCHIVE_APP_ID, 'users', currentUser.uid, 'space_folders');
        }

        async function initializeDatabase() {
            try {
                await signInAnonymously(auth);
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        isLocalMode = false;
                        updateConnectionStatus(true);
                        showToast("Connected to Firebase Archive", "success");
                        loadAllData();
                    } else {
                        updateConnectionStatus(false);
                    }
                });
            } catch (err) {
                console.error("Firebase Auth Error: ", err);
                if (err.code === 'auth/configuration-not-found' || err.code === 'auth/operation-not-allowed') {
                    showToast("Setup Required: Enable 'Anonymous' Sign-In in Firebase. Using local mode.", "error");
                    document.getElementById('db-status').innerHTML = `<div class="w-2 h-2 rounded-full bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.8)]" id="status-dot"></div> Local Mode Only`;
                    
                    isLocalMode = true;
                    currentUser = { uid: 'local-offline-user' };
                    documents = [];
                    folders = [];
                    renderSidebar();
                } else {
                    showToast("Failed to initialize Firebase Auth.", "error");
                    updateConnectionStatus(false);
                }
            }
        }

        function updateConnectionStatus(isConnected) {
            const statusEl = document.getElementById('db-status');
            if (isConnected) {
                statusEl.innerHTML = `<div class="w-2 h-2 rounded-full bg-gray-300 shadow-[0_0_8px_rgba(255,255,255,0.8)]" id="status-dot"></div> Uplink Stable`;
            } else {
                statusEl.innerHTML = `<div class="w-2 h-2 rounded-full bg-red-900 shadow-[0_0_8px_rgba(153,27,27,0.8)]" id="status-dot"></div> Disconnected`;
            }
        }

        async function loadAllData() {
            if (!currentUser || isLocalMode) return;

            try {
                // Load Documents
                const docSnap = await getDocs(getDocsRef());
                documents = [];
                docSnap.forEach((d) => documents.push(d.data()));
                
                // Load Folders
                const folderSnap = await getDocs(getFoldersRef());
                folders = [];
                folderSnap.forEach((f) => folders.push(f.data()));

                renderSidebar();
            } catch (error) {
                console.error(error);
                showToast("Error loading archives.", "error");
            }
        }

        /* =========================================
           DATA SAVING OPERATIONS
           ========================================= */
        async function submitNewFolder() {
            if (!currentUser) return;
            
            const name = document.getElementById('folder-name-input').value.trim();
            if(!name) return showToast("Folder name required.", "error");

            const newFolder = {
                id: generateId(),
                name: name,
                pinned: false,
                created_at: new Date().toISOString()
            };

            if (isLocalMode) {
                folders.push(newFolder);
                closeFolderModal();
                showToast("Folder Created Locally.", "success");
                renderSidebar();
                return;
            }

            try {
                await setDoc(doc(getFoldersRef(), newFolder.id), newFolder);
                folders.push(newFolder);
                closeFolderModal();
                showToast("Folder Preserved.", "success");
                renderSidebar();
            } catch(e) {
                console.error(e);
                showToast("Failed to create folder.", "error");
            }
        }

        async function saveDocument(isAutoSave = false) {
            if (!currentUser) return showToast("Database not connected.", "error");

            const titleInput = document.getElementById('doc-title').value.trim() || 'Untitled Record';
            const content = quill.root.innerHTML;

            const existingDoc = documents.find(d => d.id === currentDocumentId);
            const idToSave = currentDocumentId || generateId();
            
            const docData = {
                id: idToSave,
                title: titleInput,
                content: content,
                folderId: currentFolderId || 'root', // save to current folder context
                pinned: existingDoc ? existingDoc.pinned : false,
                created_at: existingDoc ? existingDoc.created_at : new Date().toISOString()
            };

            if (isLocalMode) {
                if (existingDoc) {
                    Object.assign(existingDoc, docData);
                } else {
                    documents.push(docData);
                }
                currentDocumentId = idToSave;
                updateHeaderPinUI();
                renderSidebar();
                if (!isAutoSave) showToast("Saved Locally.", "success");
                return;
            }

            try {
                await setDoc(doc(getDocsRef(), idToSave), docData);
                
                if (existingDoc) {
                    Object.assign(existingDoc, docData);
                } else {
                    documents.push(docData);
                }
                
                currentDocumentId = idToSave;
                document.getElementById('delete-btn').classList.remove('hidden');
                document.getElementById('pin-btn').classList.remove('hidden');
                updateHeaderPinUI();
                renderSidebar();
                
                if (!isAutoSave) showToast("Transmission Saved.", "success");
            } catch (error) {
                console.error(error);
                showToast("Failed to save transmission.", "error");
            }
        }

        async function deleteCurrentDocument() {
            if (!currentUser || !currentDocumentId) return;

            if (isLocalMode) {
                documents = documents.filter(d => d.id !== currentDocumentId);
                showToast("Log purged locally.", "success");
                createNewDocument();
                return;
            }

            try {
                await deleteDoc(doc(getDocsRef(), currentDocumentId));
                documents = documents.filter(d => d.id !== currentDocumentId);
                showToast("Log purged from orbit.", "success");
                createNewDocument();
            } catch (error) {
                console.error(error);
                showToast("Error deleting log.", "error");
            }
        }

        /* =========================================
           PINNING LOGIC
           ========================================= */
        async function toggleFolderPin(e, folderId) {
            e.stopPropagation(); // prevent opening folder
            const folder = folders.find(f => f.id === folderId);
            if(!folder) return;

            folder.pinned = !folder.pinned;
            renderSidebar();

            if(!isLocalMode) {
                try {
                    await setDoc(doc(getFoldersRef(), folder.id), folder);
                } catch(err) {
                    console.error(err);
                    showToast("Failed to sync pin state.", "error");
                }
            }
        }

        async function toggleDocPin(e, docId) {
            e.stopPropagation();
            const docData = documents.find(d => d.id === docId);
            if(!docData) return;

            docData.pinned = !docData.pinned;
            if(currentDocumentId === docId) updateHeaderPinUI();
            renderSidebar();

            if(!isLocalMode) {
                try {
                    await setDoc(doc(getDocsRef(), docData.id), docData);
                } catch(err) {
                    console.error(err);
                }
            }
        }

        function toggleCurrentDocPin() {
            if(currentDocumentId) {
                toggleDocPin({stopPropagation: ()=>{}}, currentDocumentId);
            }
        }

        function updateHeaderPinUI() {
            const docData = documents.find(d => d.id === currentDocumentId);
            const pinIcon = document.getElementById('header-pin-icon');
            if(docData && docData.pinned) {
                pinIcon.classList.add('ph-fill', 'pinned');
            } else {
                pinIcon.classList.remove('ph-fill', 'pinned');
            }
        }

        /* =========================================
           UI RENDERING & NAVIGATION
           ========================================= */
        function openFolder(folderId) {
            currentFolderId = folderId;
            renderSidebar();
        }

        function goBackToFolders() {
            currentFolderId = null;
            renderSidebar();
        }

        function createNewDocument() {
            currentDocumentId = null;
            document.getElementById('doc-title').value = '';
            quill.root.innerHTML = '';
            document.getElementById('delete-btn').classList.add('hidden');
            document.getElementById('pin-btn').classList.add('hidden');
            
            renderSidebar();
            if(window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('hidden')) {
                toggleSidebar();
            }
        }

        async function openDocument(id) {
            const docData = documents.find(d => d.id === id);
            if (docData) {
                currentDocumentId = docData.id;
                document.getElementById('doc-title').value = docData.title;
                quill.root.innerHTML = docData.content;
                document.getElementById('delete-btn').classList.remove('hidden');
                document.getElementById('pin-btn').classList.remove('hidden');
                updateHeaderPinUI();
                
                renderSidebar();
                if(window.innerWidth < 768) toggleSidebar();
            }
        }

        // The core rendering engine for the dynamic sidebar
        function renderSidebar() {
            const container = document.getElementById('sidebar-content');
            let html = '';

            // Sort helper
            const sorter = (a, b) => {
                if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
                return new Date(b.created_at).getTime() - new Date(a.created_at).getTime();
            };

            if (currentFolderId === null) {
                // VIEW: FOLDERS LIST + ROOT DOCUMENTS
                html += `
                    <div class="p-4 flex gap-2">
                        <button onclick="createNewDocument()" class="flex-1 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 rounded-lg font-medium transition-all text-xs uppercase tracking-widest text-center">
                            + Record
                        </button>
                        <button onclick="openFolderModal()" class="flex-1 py-2.5 px-3 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 rounded-lg font-medium transition-all text-xs uppercase tracking-widest text-center flex items-center justify-center gap-1">
                            <i class="ph ph-folder-plus text-sm"></i> Folder
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 space-y-2">
                `;

                // Add "Root Archive" virtual folder to see unassigned docs
                const rootDocsCount = documents.filter(d => d.folderId === 'root').length;
                html += `
                    <div onclick="openFolder('root')" class="p-3 rounded-lg border border-transparent hover:bg-white/5 cursor-pointer transition-all flex items-center justify-between group">
                        <div class="flex items-center gap-2">
                            <i class="ph ph-archive text-gray-400 text-lg"></i>
                            <span class="text-sm font-medium text-gray-200" style="font-family: 'Cinzel', serif;">Root Archive</span>
                        </div>
                        <span class="text-xs text-gray-600">${rootDocsCount}</span>
                    </div>
                `;

                // Render real folders
                const sortedFolders = [...folders].sort(sorter);
                sortedFolders.forEach(folder => {
                    const docCount = documents.filter(d => d.folderId === folder.id).length;
                    const pinClass = folder.pinned ? 'ph-fill pinned' : '';
                    html += `
                        <div onclick="openFolder('${folder.id}')" class="p-3 rounded-lg border border-transparent hover:bg-white/5 cursor-pointer transition-all flex items-center justify-between group">
                            <div class="flex items-center gap-2 w-full overflow-hidden">
                                <i class="ph ph-folder text-blue-400 text-lg"></i>
                                <span class="text-sm font-medium text-gray-200 truncate flex-1" style="font-family: 'Cinzel', serif;">${folder.name}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-xs text-gray-600">${docCount}</span>
                                <i class="ph ph-push-pin text-gray-600 hover:text-yellow-500 transition-colors ${pinClass}" onclick="toggleFolderPin(event, '${folder.id}')"></i>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
            } else {
                // VIEW: DOCUMENTS IN SPECIFIC FOLDER
                const isRoot = currentFolderId === 'root';
                const folderName = isRoot ? 'Root Archive' : folders.find(f => f.id === currentFolderId)?.name || 'Unknown';

                html += `
                    <div class="p-4 border-b border-white/5 bg-black/20 flex items-center justify-between">
                        <button onclick="goBackToFolders()" class="text-gray-400 hover:text-white flex items-center gap-1 text-xs uppercase tracking-widest transition-colors">
                            <i class="ph ph-caret-left"></i> Back
                        </button>
                    </div>
                    <div class="p-4 flex flex-col gap-3">
                        <h3 class="text-sm text-gray-400 font-medium truncate flex items-center gap-2" style="font-family: 'Cinzel', serif;">
                            <i class="ph ${isRoot ? 'ph-archive' : 'ph-folder-open'}"></i> ${folderName}
                        </h3>
                        <button onclick="createNewDocument()" class="w-full py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 rounded-lg transition-all text-xs uppercase tracking-widest text-center flex items-center justify-center gap-1">
                            <i class="ph ph-plus"></i> New Record Here
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 space-y-2 border-t border-white/5">
                `;

                // Render Documents for this folder
                const folderDocs = documents.filter(d => d.folderId === currentFolderId).sort(sorter);
                
                if (folderDocs.length === 0) {
                    html += `
                        <div class="text-center text-gray-600 text-sm mt-6">
                            <p class="font-light tracking-wider">Empty folder.</p>
                        </div>
                    `;
                }

                folderDocs.forEach(doc => {
                    const isActive = doc.id === currentDocumentId;
                    const activeClasses = isActive ? 'bg-white/10 border-white/20' : 'border-transparent hover:bg-white/5';
                    const date = new Date(doc.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                    const pinClass = doc.pinned ? 'ph-fill pinned' : '';

                    html += `
                        <div onclick="openDocument('${doc.id}')" class="p-3 rounded-lg border ${activeClasses} cursor-pointer transition-all flex flex-col gap-1 group relative pr-8">
                            <span class="text-sm font-medium text-gray-200 truncate group-hover:text-white transition-colors" style="font-family: 'Cinzel', serif;">${doc.title || 'Untitled'}</span>
                            <div class="flex items-center gap-1.5 text-xs text-gray-500 font-light">
                                <i class="ph ph-clock"></i>
                                <span>${date}</span>
                            </div>
                            <button onclick="toggleDocPin(event, '${doc.id}')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-600 hover:text-yellow-500 transition-colors opacity-0 group-hover:opacity-100 ${doc.pinned ? 'opacity-100' : ''}">
                                <i class="ph ph-push-pin text-lg ${pinClass}"></i>
                            </button>
                        </div>
                    `;
                });

                html += `</div>`;
            }

            container.innerHTML = html;
        }

        /* =========================================
           MODALS & TOASTS
           ========================================= */
        function openFolderModal() {
            const modal = document.getElementById('folder-modal');
            const content = document.getElementById('folder-modal-content');
            document.getElementById('folder-name-input').value = '';
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => content.classList.remove('scale-95'), 10);
            setTimeout(() => document.getElementById('folder-name-input').focus(), 300);
        }

        function closeFolderModal() {
            const modal = document.getElementById('folder-modal');
            const content = document.getElementById('folder-modal-content');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('opacity-0', 'pointer-events-none'), 300);
        }

        function openConfigModal() {
            const modal = document.getElementById('config-modal');
            const content = document.getElementById('config-modal-content');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => content.classList.remove('scale-95'), 10);
        }

        function closeConfigModal() {
            const modal = document.getElementById('config-modal');
            const content = document.getElementById('config-modal-content');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('opacity-0', 'pointer-events-none'), 300);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('flex', 'absolute', 'inset-y-4', 'left-4', 'z-50', 'w-[calc(100%-2rem)]');
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('flex', 'absolute', 'inset-y-4', 'left-4', 'z-50', 'w-[calc(100%-2rem)]');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let icon = 'ph-info';
            let bgClass = 'bg-black/90 border-gray-700';
            let iconColor = 'text-gray-300';

            if (type === 'success') {
                icon = 'ph-check-circle';
                bgClass = 'bg-black/90 border-gray-500';
                iconColor = 'text-gray-100';
            } else if (type === 'error') {
                icon = 'ph-warning-circle';
                bgClass = 'bg-black/90 border-red-900/50';
                iconColor = 'text-red-400/80';
            }

            toast.className = `glass-panel ${bgClass} border rounded-lg p-4 flex items-center gap-3 shadow-2xl toast-enter-active min-w-[250px] backdrop-blur-xl z-50`;
            toast.innerHTML = `
                <i class="ph ${icon} text-xl ${iconColor}"></i>
                <p class="text-sm font-light tracking-wide text-gray-200">${message}</p>
            `;

            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('toast-enter'));

            setTimeout(() => {
                toast.classList.add('toast-exit-active');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        /* =========================================
           BOOTSTRAP
           ========================================= */
        window.onload = function() {
            setTimeout(() => {
                initSpaceSimulation();
                initEditor();
                initializeDatabase();
            }, 100);
            
            window.addEventListener('resize', () => {
                const sidebar = document.getElementById('sidebar');
                if (window.innerWidth >= 768) {
                    sidebar.classList.remove('hidden', 'absolute', 'inset-y-4', 'left-4', 'z-50', 'w-[calc(100%-2rem)]');
                    sidebar.classList.add('flex');
                } else if(!sidebar.classList.contains('absolute')) {
                    sidebar.classList.add('hidden');
                }
            });
        };
    </script>
</body>
</html>
